name: Build ZMK Firmware

on:
  push:
    paths:
      - 'config/**'
  pull_request:
    paths:
      - 'config/**'
  workflow_dispatch:

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3.0
    # ⭕ 【修正箇所】ここから下を追加します
    with:
      # ⭕ 引数の不一致（argument-mismatch）および関数シグネチャの警告によるビルド停止を完全に無効化します
      extra-cmake-args: "-DZEPHYR_EXTRA_CFLAGS=\"-Wno-error=return-type -Wno-error=implicit-function-declaration -Wno-error=argument-mismatch -Wno-argument-mismatch\""
